<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PetriDish Clicker</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="background"></div>

<!-- TOP -->
<div class="topbar">

  <div class="logo">
    🧬 PetriDish
  </div>

  <div class="stats">
    <div class="score-box">
      PTS: <span id="score">0</span>
    </div>

    <div class="energy-box">
      ⚡ <span id="energy">100</span>
    </div>
  </div>

</div>

<!-- CENTER -->
<div class="center">

  <button class="cell" onclick="clickCell()">
    <img src="assets/icon.png">
  </button>

</div>

<!-- BOTTOM MENU -->
<div class="bottom-menu">

  <button onclick="openModal('shop')">
    🛒 Shop
  </button>

  <button onclick="openModal('tasks')">
    📋 Tasks
  </button>

  <button onclick="openModal('achievements')">
    🏆 Achievements
  </button>

  <button onclick="openModal('profile')">
    👤 Profile
  </button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

  <div class="modal-content">

    <span class="close" onclick="closeModal()">
      ✖
    </span>

    <div id="modal-body"></div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
